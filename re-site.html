<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>반응형 예제 1</title>
    <link rel="stylesheet" href="css/re-site.css" />
    <link rel="stylesheet" href="css/re-site_responsive.css" />
  </head>
  <body>
    <!-- 전체 레이아웃 -->
    <div class="wrap">
      <!-- 헤더 -->
      <header class="header">
        <div class="inner">
          <h1>LOGO</h1>
          <!-- 햄버거버튼 -->
          <div class="menu-btn">☰</div>
          <!-- 메뉴 -->
          <ul class="gnb">
            <li><a href="#">메뉴 1</a></li>
            <li><a href="#">메뉴 2</a></li>
            <li><a href="#">메뉴 3</a></li>
            <li><a href="#">메뉴 4</a></li>
          </ul>
        </div>
      </header>
      <!-- 비주얼 -->
      <section class="visual">
        <div class="visual-img">
          <img src="images/visual.png" alt="pc" class="pc-visal" />
          <img src="images/fish&chips.png" alt="tablet" class="tablet-visal" />
        </div>
        <!-- visual txt -->
        <!-- 인너 -->
        <div class="visual-inner inner">
          <div class="visual-txt">
            <h2>WELCOME</h2>
            <p>햄버거 메뉴 연습🍔🍕</p>
          </div>
        </div>
      </section>
      <!-- 상품 -->
      <main>
        <div class="inner">
          <ul class="product-list">
            <li>상품 1</li>
            <li>상품 2</li>
            <li>상품 3</li>
            <li>상품 4</li>
            <li>상품 5</li>
            <li>상품 6</li>
            <li>상품 7</li>
            <li>상품 8</li>
            <li>상품 9</li>
            <li>상품 10</li>
          </ul>
        </div>
      </main>
      <!-- 하단 -->
      <footer>
        <div class="inner">
          <div class="footer-top">
            <h2>LOGO</h2>
          </div>
          <div class="footer-middle">
            <ul>
              <li><a href="#">회사소개</a></li>
              |
              <li><a href="#">이용약관</a></li>
              |
              <li><a href="#">개인정보처리방침</a></li>
            </ul>
            <p>대구시 중구 123 · 전화: 02-1234-5678 · 이메일: test@test.com</p>
          </div>
          <div class="footer-bottom">
            <p>© 2026 COMPANY</p>
          </div>
        </div>
      </footer>
      <!-- js 코드 -->
      <script>
        // 햄버거바 클릭
        const menu_btn = document.querySelector(".menu-btn");
        const gnb = document.querySelector(".gnb");
        menu_btn.addEventListener("click", () => {
        //   if (gnb.style.display === "block") {
        //     gnb.style.display = "none";
        //   } else {
        //     gnb.style.display = "block";
        //   }
        gnb.classList.toggle("on");
        });
      </script>
    </div>
  </body>
</html>
